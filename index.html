
<!DOCTYPE html>
<html lang="ja">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Kaorina Miki - Profile</title>

<style>
    body {
        margin: 0;
        padding: 0;
        font-family: 'Segoe UI', sans-serif;
        background: linear-gradient(135deg, #a0e9ff, #c2f5ff, #e0fbff);
        display: flex;
        justify-content: center;
        align-items: center;
        height: 100vh;
    }

    .card {
        background: white;
        padding: 50px;
        border-radius: 25px;
        box-shadow: 0 15px 40px rgba(0, 180, 255, 0.3);
        text-align: center;
        width: 350px;
        transition: 0.3s ease;
    }

    .card:hover {
        transform: translateY(-8px);
        box-shadow: 0 20px 50px rgba(0, 180, 255, 0.5);
    }

    h1 {
        font-size: 30px;
        margin-bottom: 5px;
        color: #00a8e8;
        letter-spacing: 2px;
    }

    h2 {
        font-size: 16px;
        font-weight: normal;
        color: #6dd5fa;
        margin-bottom: 20px;
    }

    .line {
        width: 50px;
        height: 4px;
        background: #6dd5fa;
        margin: 20px auto;
        border-radius: 10px;
    }

    p {
        font-size: 14px;
        color: #555;
        line-height: 1.8;
    }

    .button {
        margin-top: 25px;
        display: inline-block;
        padding: 10px 25px;
        background: #6dd5fa;
        border-radius: 30px;
        text-decoration: none;
        color: white;
        font-size: 14px;
        transition: 0.3s;
    }

    .button:hover {
        background: #00b4ff;
        box-shadow: 0 5px 20px rgba(0, 180, 255, 0.5);
    }
</style>
</head>

<body>

<div class="card">
    <h1>三木 香里奈</h1>
    <h2>Karina Miki</h2>
    <div class="line"></div>
    <p>
    はじめまして。<br>
    みきかりなです。<br>
    興味を持ったことには全力です！
　　</p>   　
    <a href="#" class="button">もっと見る</a>
</div>

</body>
</html>
