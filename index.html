<!DOCTYPE html>
<html lang="ja">
<head>
<meta charset="UTF-8">

<title>Kaori Miki - Profile</title>

<style>
    body {
        margin: 0;
        padding: 0;
        font-family: 'Segoe UI', sans-serif;

        color: white;
        display: flex;
        justify-content: center;
        align-items: center;
        height: 100vh;
    }

    .card {

    .card:hover {
        transform: scale(1.05);
        box-shadow: 0 0 60px rgba(0, 255, 255, 0.8);
    }

    h1 {
        font-size: 32px;
        margin-bottom: 10px;
        letter-spacing: 2px;
    }

    h2 {
        font-size: 18px;
        font-weight: normal;
        color: #00ffff;
        margin-bottom: 30px;
    }

    p {
        font-size: 14px;
        line-height: 1.8;
        opacity: 0.85;
    }

    .line {
        width: 60px;
        height: 3px;
        background: #00ffff;
        margin: 20px auto;
        border-radius: 10px;
    }

    .button {
        margin-top: 25px;
        display: inline-block;
        padding: 10px 20px;
        border: 1px solid #00ffff;
        border-radius: 30px;
        text-decoration: none;
        color: #00ffff;
        transition: 0.3s;

    <p>

    <a href="#" class="button">More</a>

</html>
